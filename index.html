function isDueTom(s){var d=parseD(s);if(!d)return false;var t=new Date();t.setDate(t.getDate()+1);t.setHours(0,0,0,0);d.setHours(0,0,0,0);return d.getTime()===t.getTime()}
function isOverdue(s){var d=parseD(s);if(!d)return false;return d<new Date()}
function isSettled(b){if(unpaid(b)>0)return false;return true}
function sBadge(s){var m={active:'badge-active',cancelled:'badge-cancelled',changed:'badge-changed',done:'badge-done',completed:'badge-completed'};return '<span class="badge '+(m[s]||'badge-active')+'">'+s+'</span>'}
function rClass(b){var c=b.status==='cancelled'?'row-cancelled':b.status==='changed'?'row-changed':b.status==='completed'?'row-done':'row-active';if(b.status==='active'&&isDueTom(b.paymentDueDate))c+=' due-alert';return c}

function canDel(){return currentUser&&currentUser.role==='superadmin'}
function fTravel(b){if(!b.travelDate)return '\u2014';return fD(b.travelDate)+(b.travelDateTo&&b.travelDateTo!==b.travelDate?' \u2192 '+fD(b.travelDateTo):'')}

function sortBookings(arr){return arr.slice().sort(function(a,b){var order={active:1,changed:2,cancelled:3,completed:4};var sd=(order[a.status]||5)-(order[b.status]||5);if(sd!==0)return sd;var da=parseD(a.bookingDate),db=parseD(b.bookingDate);return(da&&db)?db-da:0})}

function toast(msg,type){type=type||'success';var c=document.getElementById('toastContainer');var cl={success:'bg-green-600',error:'bg-red-600',info:'bg-pri-600',warning:'bg-amber-600'};var ic={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle',warning:'fa-exclamation-triangle'};var t=document.createElement('div');t.className='toast '+(cl[type]||cl.info)+' text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm';t.innerHTML='<i class="fas '+(ic[type]||ic.info)+'"></i>'+msg;c.appendChild(t);setTimeout(function(){t.remove()},3200)}

function rDash(){var ac=travelBookings.filter(function(b){return b.status==='active'});var tC=ac.reduce(function(s,b){return s+b.amountCollected},0);var tP=ac.reduce(function(s,b){return s+b.totalAmountPayable},0);var tPd=ac.reduce(function(s,b){return s+b.amountPaid},0);var tPr=ac.reduce(function(s,b){return s+bkProfit(b)},0);var ov=travelBookings.filter(function(b){return b.status==='active'&&isOverdue(b.paymentDueDate)}).length;var dt=travelBookings.filter(function(b){return b.status==='active'&&isDueTom(b.paymentDueDate)}).length;var tc={flight:0,hotel:0,train:0,bustaxi:0,boat:0};travelBookings.forEach(function(b){if(b.status==='active')tc[b.bookingType]=(tc[b.bookingType]||0)+1});return '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8"><div class="bg-white rounded-xl p-5 border border-cream-300 card-hover"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold text-pri-600/60 uppercase tracking-wider">Clients</span><div class="w-9 h-9 rounded-lg bg-pri-50 flex items-center justify-center"><i class="fas fa-users text-pri-500 text-sm"></i></div></div><p class="font-display font-bold text-3xl text-pri-800">'+clients.length+'</p></div><div class="bg-white rounded-xl p-5 border border-cream-300 card-hover"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold text-acc-600/60 uppercase tracking-wider">Collected</span><div class="w-9 h-9 rounded-lg bg-acc-50 flex items-center justify-center"><i class="fas fa-hand-holding-dollar text-acc-500 text-sm"></i></div></div><p class="font-display font-bold text-3xl text-acc-800">'+fmt(tC)+'</p></div><div class="bg-white rounded-xl p-5 border border-cream-300 card-hover"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold text-red-600/60 uppercase tracking-wider">Unpaid</span><div class="w-9 h-9 rounded-lg bg-red-50 flex items-center justify-center"><i class="fas fa-exclamation-triangle text-red-500 text-sm"></i></div></div><p class="font-display font-bold text-3xl text-red-700">'+fmt(tP-tPd)+'</p><p class="text-xs text-red-600/50 mt-1">'+ov+' overdue, '+dt+' due tomorrow</p></div><div class="bg-white rounded-xl p-5 border border-cream-300 card-hover"><div class="flex items-center justify-between mb-3"><span class="text-xs font-semibold text-green-600/60 uppercase tracking-wider">Profit</span><div class="w-9 h-9 rounded-lg bg-green-50 flex items-center justify-center"><i class="fas fa-chart-line text-green-500 text-sm"></i></div></div><p class="font-display font-bold text-3xl '+(tPr>=0?'text-green-700':'text-red-700')+'">'+fmt(tPr)+'</p></div></div><div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">'+bTypeCard('flight','Flights',tc.flight,'blue')+bTypeCard('hotel','Hotels',tc.hotel,'purple')+bTypeCard('train','Trains',tc.train,'emerald')+bTypeCard('bustaxi','Bus/Taxi',tc.bustaxi,'orange')+bTypeCard('boat','Boat',tc.boat,'cyan')+'</div><div class="bg-white rounded-xl border border-cream-300 p-6"><h3 class="font-display font-bold text-pri-800 mb-4">Collection Progress</h3><div class="flex items-center gap-4 mb-3"><div class="flex-1 h-4 bg-cream-200 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width:'+(tP>0?(tPd/tP*100):0)+'%"></div></div><span class="text-sm font-semibold text-pri-700">'+(tP>0?(tPd/tP*100).toFixed(1):0)+'%</span></div><div class="flex gap-6 text-xs text-pri-600/60"><span><span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-1"></span>Paid: '+fmt(tPd)+'</span><span><span class="inline-block w-2 h-2 rounded-full bg-cream-300 mr-1"></span>Owed: '+fmt(tP-tPd)+'</span></div></div>'}

bk.length+'</p></div><div class="text-center"><p class="text-xs text-pri-600/50">Collected</p><p class="text-sm font-bold text-green-600">'+fmt(tot)+'</p></div></div>';h+='<div class="mt-3 pt-3 border-t border-cream-200 flex gap-2">';if(isDone){h+='<button onclick="event.stopPropagation();newBookingForDoneClient('+c.id+')" class="flex-1 bg-pri-500 hover:bg-pri-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"><i class="fas fa-plus mr-1"></i>New Booking</button>'}else{h+='<button onclick="event.stopPropagation();markClientDone('+c.id+')" class="flex-1 bg-green-50 hover:bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors"><i class="fas fa-check mr-1"></i>Done</button>'}h+='<button onclick="event.stopPropagation();openCForm('+c.id+')" class="bg-pri-50 hover:bg-pri-100 text-pri-700 px-3 py-1.5 rounded-lg text-xs font-semibold"><i class="fas fa-edit"></i></button>';if(canDel())h+='<button onclick="event.stopPropagation();delC('+c.id+')" class="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-xs font-semibold"><i class="fas fa-trash"></i></button>';h+='</div></div>';return h}).join('')+'</div>'}

-600">Cancel</button></div></form></div>';openM(html);window.autoCalc=function(){var f=document.getElementById('bForm');if(!f)return;var cr=parseFloat(f.customerRate.value)||0;var apc=parseFloat(f.amountPaidByCustomer.value)||0;var cbp=parseFloat(f.customerBalancePaid.value)||0;var sr=parseFloat(f.supplierRate.value)||0;var aps=parseFloat(f.amountPaidToSupplier.value)||0;f.customerBalanceAmount.value=Math.max(0,cr-apc-cbp);f.supplierBalanceAmount.value=Math.max(0,sr-aps);var p=cr-sr;f.profitDisplay.value=p;f.profitDisplay.className='w-full border border-cream-200 bg-green-50 rounded-lg px-3 py-2.5 text-sm font-semibold '+(p>=0?'profit-pos':'profit-neg')};window.checkDueBlink=function(){var f=document.getElementById('bForm');if(!f)return;var dStr=f.supplierPaymentDueDate.value;if(!dStr){f.supplierPaymentDueDate.classList.remove('due-alert');return}var d=new Date(dStr);var now=new Date();now.setHours(0,0,0,0);var diff=(d-now)/(1000*60*60*24);if(diff<=2&&diff>=0)f.supplierPaymentDueDate.classList.add('due-alert');else f.supplierPaymentDueDate.classList.remove('due-alert')};autoCalc();checkDueBlink();document.getElementById('bForm').addEventListener('submit',saveB)}
function saveB(e){e.preventDefault();var fd=new FormData(e.target);var d=Object.fromEntries(fd);d.clientId=parseInt(d.clientId);d.customerRate=parseFloat(d.customerRate)||0;d.amountPaidByCustomer=parseFloat(d.amountPaidByCustomer)||0;d.customerBalancePaid=parseFloat(d.customerBalancePaid)||0;d.supplierRate=parseFloat(d.supplierRate)||0;d.amountPaidToSupplier=parseFloat(d.amountPaidToSupplier)||0;d.totalAmountPayable=d.supplierRate;d.amountPaid=d.amountPaidToSupplier;d.amountCollected=d.customerRate;['bookingDate','travelDate','travelDateTo','supplierPaymentDueDate','customerPaidDate','customerBalancePaidDate','supplierPaymentDate'].forEach(function(k){if(d[k])d[k]=fromInp(d[k])});d.paymentDueDate=d.supplierPaymentDueDate;delete d.customerBalanceAmount;delete d.supplierBalanceAmount;delete d.profitDisplay;if(d.id){var idx=travelBookings.findIndex(function(b){return b.id==d.id});if(idx>=0){travelBookings[idx]=Object.assign({},travelBookings[idx],d,{modifiedBy:currentUser.username,modifiedAt:nowTS()});addLog('edit_booking','Edited booking '+d.pnrRef);toast('Booking updated')}}else{d.id=nextId.booking++;d.status='active';d.cancelChangeRemarks='';d.createdBy=currentUser.username;d.createdAt=todayStr();d.modifiedBy='';d.modifiedAt='';travelBookings.push(d);addLog('create_booking','Created booking '+d.pnrRef);toast('Booking created')}closeM();render()}

function changeBk(id){var b=travelBookings.find(function(x){return x.id===id});if(!b)return;var cl=gC(b.clientId);openM('<div class="w-full max-w-md p-6"><div class="flex items-center justify-between mb-4"><h3 class="font-display font-bold text-amber-700 text-xl"><i class="fas fa-exchange-alt mr-2"></i>Change Booking</h3><button onclick="closeM()" class="text-pri-400 hover:text-pri-600"><i class="fas fa-times"></i></button></div><div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4"><p class="text-sm font-semibold text-amber-800">'+b.bookingName+'</p><p class="text-xs text-amber-600">'+b.pnrRef+' | '+(cl?cl.name:'?')+' | '+fTravel(b)+'</p></div><div class="mb-4"><label class="block text-xs font-semibold text-pri-600/70 uppercase mb-1">Reason for Change (required)</label><textarea id="changeRm" rows="3" required class="w-full border border-amber-300 rounded-lg px-3 py-2.5 text-sm resize-none focus:border-amber-500" placeholder="Describe what changed..."></textarea></div><div class="flex gap-3"><button onclick="doChange('+id+')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2.5 rounded-lg text-sm font-semibold">Confirm Change</button><button onclick="closeM()" class="flex-1 border border-cream-300 py-2.5 rounded-lg text-sm text-pri-600">Cancel</button></div></div>')}

function delBk(id){if(!canDel()){toast('Only Super Admin can delete','error');return}var b=travelBookings.find(function(x){return x.id===id});if(!b)return;openM('<div class="w-full max-w-sm p-6 text-center"><div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4"><i class="fas fa-trash text-red-500 text-xl"></i></div><h3 class="font-display font-bold text-pri-800 text-lg mb-2">Delete Booking?</h3><p class="text-sm text-pri-600/60 mb-2">'+b.bookingName+' ('+b.pnrRef+')</p><p class="text-xs text-pri-600/50 mb-6">Moves to Recycle Bin.</p><div class="flex gap-3"><button onclick="doDelBk('+id+')" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-lg text-sm font-semibold">Delete</button><button onclick="closeM()" class="flex-1 border border-cream-300 py-2.5 rounded-lg text-sm text-pri-600">Cancel</button></div></div>')}
